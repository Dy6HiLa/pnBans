# Все сообщения pnBans. Поддерживаются &-цвета и HEX вида &#A0EFA1.
# {prefix} работает в любой строке и выводится только там, где он указан.
prefix: '&#429F91&lᴘ&#60AC93&lɴ&#7EB996&lʙ&#9CC598&lᴀ&#BAD29B&lɴ&#D8DF9D&lꜱ &7| &f'

# Полные подсказки команд. Здесь можно менять текст и цвета.
usage:
  ban: '{prefix}Использование: &#D8DF9D/ban <ник> <время> <причина> [-s]'
  mute: '{prefix}Использование: &#D8DF9D/mute <ник> <время> <причина> [-s]'
  warn: '{prefix}Использование: &#D8DF9D/warn <ник> <время> <причина> [-s]'
  ipban: '{prefix}Использование: &#D8DF9D/ipban <ник|ip> <время> <причина> [-s]'
  unban: '{prefix}Использование: &#D8DF9D/unban <ник>'
  unmute: '{prefix}Использование: &#D8DF9D/unmute <ник>'
  unwarn: '{prefix}Использование: &#D8DF9D/unwarn <ник>'
  unipban: '{prefix}Использование: &#D8DF9D/unipban <ник|ip>'
  history: '{prefix}Использование: &#D8DF9D/history <ник> &f| &#D8DF9D/history staff [модератор]'
  dupeip: '{prefix}Использование: &#D8DF9D/dupeip <ник>'
  pnbans: '{prefix}Использование: &#D8DF9D/pnbans reload'
  fallback: '{prefix}Использование: &#D8DF9D{usage}'

muted-chat-message:
  - '{prefix}Вы не можете писать в чат.'
  - '&7Осталось: &f{remaining}'
  - '&7Причина: &#FF2B2B{reason}'

pnbans-info:
  - ''
  - '&#429F91&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
  - '{prefix}Панель администратора'
  - ''
  - '&#429F91▸ &fВерсия: &#D8DF9D{version}'
  - '&#429F91▸ &fСерверы: &#D8DF9D1.21 - 1.21.11'
  - '&#429F91▸ &fОбновление: {update}'
  - '&#429F91▸ &fПоддержка: &#D8DF9D{discord}'
  - ''
  - '&#429F91Команды'
  - '&#429F91▸ &#D8DF9D/pnbans &8— &7показать это меню'
  - '&#429F91▸ &#D8DF9D/pnbans reload &8— &7перезагрузить настройки'
  - '&#429F91▸ &#D8DF9D/ban игрок срок [причина] [-s] &8— &7заблокировать игрока'
  - '&#429F91▸ &#D8DF9D/unban игрок &8— &7разблокировать игрока'
  - '&#429F91▸ &#D8DF9D/ipban игрок|ip срок причина [-s] &8— &7заблокировать IP'
  - '&#429F91▸ &#D8DF9D/unipban игрок|ip &8— &7разблокировать IP'
  - '&#429F91▸ &#D8DF9D/mute игрок срок [причина] [-s] &8— &7выдать мут'
  - '&#429F91▸ &#D8DF9D/unmute игрок &8— &7снять мут'
  - '&#429F91▸ &#D8DF9D/warn игрок срок [причина] [-s] &8— &7выдать предупреждение'
  - '&#429F91▸ &#D8DF9D/unwarn игрок &8— &7снять предупреждение'
  - '&#429F91▸ &#D8DF9D/history игрок &8— &7открыть историю игрока'
  - '&#429F91▸ &#D8DF9D/history staff [модератор] &8— &7открыть историю персонала'
  - '&#429F91▸ &#D8DF9D/dupeip игрок &8— &7проверить связанные аккаунты'
  - '&#429F91&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
  - ''

